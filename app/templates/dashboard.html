<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель студента | Musa Code Academy</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app-header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
    <script type="module" src="{{ url_for('static', path='js/app-header.js') }}"></script>
    <script type="module" src="{{ url_for('static', path='js/dashboard.js') }}"></script>
</head>
<body>
    <header class="app-header">
        <div class="app-header__inner">
            <a class="app-header__brand" href="/dashboard" aria-label="Musa Code Academy">
                <span class="app-header__mark" aria-hidden="true">M</span>
                <span>Musa Code Academy</span>
            </a>

            <div class="app-header__profile" data-app-profile>
                <button
                    class="app-header__profile-button"
                    type="button"
                    aria-label="Открыть меню профиля"
                    aria-haspopup="true"
                    aria-expanded="false"
                    data-app-profile-button
                >М</button>
                <div class="app-header__menu" role="menu">
                    <a class="app-header__menu-item" href="#" role="menuitem">Профиль</a>
                    <a class="app-header__menu-item" href="#" role="menuitem">Настройки</a>
                    <button class="app-header__menu-item" type="button" role="menuitem">Выйти</button>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard">
        <section class="dashboard-greeting" aria-labelledby="dashboard-greeting-title">
            <h1 id="dashboard-greeting-title">Панель студента</h1>
            <p>Ваши курсы и быстрый переход к обучению.</p>
        </section>

        <section class="learning-hero" aria-labelledby="current-course-title" data-current-course hidden>
            <div class="learning-hero__content">
                <div class="current-course" aria-label="Текущий курс">
                    <div>
                        <p class="current-course__label">Текущий курс</p>
                        <h2 id="current-course-title" data-current-course-title></h2>
                    </div>
                    <span class="current-course__percent" data-current-course-percent>0%</span>
                </div>

                <div class="progress" data-current-course-progress aria-label="Прогресс курса 0 процентов">
                    <span class="progress__bar">
                        <span class="progress__value" data-current-course-progress-bar style="width: 0%;"></span>
                    </span>
                </div>

                <dl class="lesson-summary">
                    <div>
                        <dt>Статус</dt>
                        <dd data-current-course-status></dd>
                    </div>
                    <div>
                        <dt>Курс</dt>
                        <dd data-current-course-description></dd>
                    </div>
                </dl>

                <a class="primary-action" href="#" data-current-course-link>Начать обучение</a>
            </div>
        </section>

        <section class="dashboard-section" aria-labelledby="courses-title">
            <div class="section-heading">
                <h2 id="courses-title">Мои курсы</h2>
            </div>

            <div class="dashboard-state" data-dashboard-loading role="status">
                Загружаем ваши курсы...
            </div>

            <div class="dashboard-state dashboard-state--error" data-dashboard-error role="alert" hidden>
                <p data-dashboard-error-message>Не удалось загрузить курсы.</p>
                <button type="button" data-dashboard-retry>Повторить</button>
            </div>

            <div class="dashboard-state dashboard-state--empty" data-dashboard-empty hidden>
                <p>У вас пока нет записей на курсы.</p>
                <p>Откройте страницу нужного курса и запишитесь на него.</p>
            </div>

            <div class="course-grid" data-course-list></div>
        </section>
    </main>
</body>
</html>
