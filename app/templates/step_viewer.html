<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/step-renderer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/step-viewer.css') }}">
    <script
        type="module"
        src="{{ url_for('static', path='js/step-viewer.js') }}"
    ></script>
</head>
<body>
    <button
        class="step-drawer-toggle"
        type="button"
        aria-label="Открыть навигацию по шагам"
        aria-controls="step-navigation-drawer"
        aria-expanded="false"
        data-step-drawer-toggle
    >
        <span aria-hidden="true">☰</span>
    </button>

    <div class="step-drawer-backdrop" data-step-drawer-backdrop></div>

    <aside
        class="step-drawer"
        id="step-navigation-drawer"
        aria-hidden="true"
        aria-labelledby="step-drawer-title"
        data-step-drawer
    >
        <header class="step-drawer__header">
            <p class="step-drawer__eyebrow">Урок</p>
            <h2 class="step-drawer__title" id="step-drawer-title">Основы Python</h2>
        </header>

        <nav aria-label="Шаги урока">
            <ol class="step-drawer__list">
                <li class="step-drawer__item step-drawer__item--completed">
                    <span class="step-drawer__status" aria-hidden="true">✓</span>
                    <span>Введение</span>
                    <span class="visually-hidden">Пройдено</span>
                </li>
                <li class="step-drawer__item step-drawer__item--completed">
                    <span class="step-drawer__status" aria-hidden="true">✓</span>
                    <span>Что такое Python</span>
                    <span class="visually-hidden">Пройдено</span>
                </li>
                <li
                    class="step-drawer__item step-drawer__item--current"
                    aria-current="step"
                >
                    <span class="step-drawer__status" aria-hidden="true">●</span>
                    <span>Переменные</span>
                    <span class="visually-hidden">Текущий шаг</span>
                </li>
                <li class="step-drawer__item step-drawer__item--upcoming">
                    <span class="step-drawer__status" aria-hidden="true">○</span>
                    <span>Ввод данных</span>
                    <span class="visually-hidden">Предстоящий шаг</span>
                </li>
                <li class="step-drawer__item step-drawer__item--upcoming">
                    <span class="step-drawer__status" aria-hidden="true">○</span>
                    <span>Практика</span>
                    <span class="visually-hidden">Предстоящий шаг</span>
                </li>
                <li class="step-drawer__item step-drawer__item--upcoming">
                    <span class="step-drawer__status" aria-hidden="true">○</span>
                    <span>Итоги</span>
                    <span class="visually-hidden">Предстоящий шаг</span>
                </li>
            </ol>
        </nav>
    </aside>

    <main
        class="step-viewer"
        data-step-viewer
        data-step-id="{{ step_id }}"
        data-course-slug="{{ course_slug }}"
    >
        <header class="step-viewer__header">
            <a
                class="step-viewer__back-link"
                role="link"
                aria-disabled="true"
                data-back-to-lesson
            ></a>
            <h1 class="step-viewer__title" data-step-title></h1>
            <p class="step-viewer__progress" data-step-progress></p>
        </header>

        <section
            class="step-viewer__content"
            data-step-content
            aria-live="polite"
            aria-busy="true"
        >
            <div class="step-viewer__placeholder" data-content-placeholder></div>
        </section>

        <nav class="step-viewer__navigation" data-step-navigation>
            <button
                class="step-viewer__navigation-button"
                type="button"
                data-previous-step
                disabled
            ></button>
            <button
                class="step-viewer__navigation-button step-viewer__navigation-button--primary"
                type="button"
                data-next-step
                disabled
            ></button>
        </nav>
    </main>
</body>
</html>
