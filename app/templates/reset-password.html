<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создайте новый пароль | Musa Code Academy</title>
    <link rel="stylesheet" href="{{url_for('static', path='css/login.css')}}">
    <script defer src="{{url_for('static', path='js/reset-password.js')}}"></script>
</head>
<body>
    <main class="page">
        <section class="panel" aria-labelledby="reset-password-title">
            <div class="brand" aria-label="Musa Code Academy">
                <span class="brand-mark">MC</span>
                <span>Musa Code Academy</span>
            </div>

            <p class="eyebrow">Восстановление аккаунта</p>
            <h1 id="reset-password-title">Создайте новый пароль</h1>
            <p class="lead">Придумайте новый пароль для своего аккаунта Musa Code Academy.</p>

            <div class="message" id="form-message" role="status" aria-live="polite"></div>

            <form class="form" id="reset-password-form" novalidate>
                <div class="field">
                    <label for="password">Пароль</label>
                    <input id="password" type="password" name="password" placeholder="Введите новый пароль" autocomplete="new-password" required aria-describedby="form-message">
                </div>

                <div class="field">
                    <label for="password-confirm">Подтвердите пароль</label>
                    <input id="password-confirm" type="password" name="password_confirm" placeholder="Повторите новый пароль" autocomplete="new-password" required aria-describedby="form-message">
                </div>

                <button type="submit">Сохранить пароль</button>
            </form>

            <p class="switch-link"><a href="/login">Вернуться ко входу</a></p>
        </section>
    </main>
</body>
</html>
