<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a new password | Musa Code Academy</title>
    <link rel="stylesheet" href="{{url_for('static', path='css/login.css')}}">
    <script defer src="{{url_for('static', path='js/reset-password.js')}}"></script>
</head>
<body>
    <main class="page">
        <section class="panel" aria-labelledby="reset-password-title">
            <div class="brand" aria-label="Musa Code Academy">
                <span class="brand-mark">MC</span>
                <span>Musa Code Academy</span>
            </div>

            <p class="eyebrow">Account recovery</p>
            <h1 id="reset-password-title">Create a new password</h1>
            <p class="lead">Choose a new password for your Musa Code Academy account.</p>

            <div class="message" id="form-message" role="status" aria-live="polite"></div>

            <form class="form" id="reset-password-form" novalidate>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Enter a new password" autocomplete="new-password" required aria-describedby="form-message">
                </div>

                <div class="field">
                    <label for="password-confirm">Confirm password</label>
                    <input id="password-confirm" type="password" name="password_confirm" placeholder="Repeat the new password" autocomplete="new-password" required aria-describedby="form-message">
                </div>

                <button type="submit">Save password</button>
            </form>

            <p class="switch-link"><a href="/login">Back to sign in</a></p>
        </section>
    </main>
</body>
</html>
