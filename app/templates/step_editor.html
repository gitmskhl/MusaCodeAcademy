<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/step-editor.css') }}">
    <script
        type="module"
        src="{{ url_for('static', path='js/step-editor/step-editor.js') }}"
    ></script>
</head>
<body>
    <main class="step-editor" data-step-editor data-step-id="{{ step_id }}">
        <header class="editor-toolbar">
            <div class="editor-toolbar__start">
                <a class="icon-button" href="/admin" data-back-button aria-label="Go back">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>
                <h1>Step Editor</h1>
            </div>

            <div class="editor-toolbar__actions">
                <button class="button button--primary" type="button" data-save-button>
                    Save
                </button>
            </div>
        </header>

        <section class="editor-panel" data-editor-panel aria-label="Step content editor">
            <div class="editor-workspace">
                <div class="editor-main">
                    <section class="editor-section editor-section--layout">
                        <h2>Layout</h2>

                        <div class="layout-options" role="radiogroup" aria-label="Step layout">
                            <label class="layout-option">
                                <input
                                    type="radio"
                                    name="step-layout"
                                    value="vertical"
                                    data-layout-option
                                    checked
                                >
                                <span class="layout-option__icon layout-option__icon--vertical" aria-hidden="true">
                                    <i></i><i></i>
                                </span>
                                <strong>Vertical</strong>
                            </label>

                            <label class="layout-option">
                                <input
                                    type="radio"
                                    name="step-layout"
                                    value="two_columns"
                                    data-layout-option
                                >
                                <span class="layout-option__icon layout-option__icon--columns" aria-hidden="true">
                                    <i></i><i></i>
                                </span>
                                <strong>Two columns</strong>
                            </label>
                        </div>
                    </section>

                    <section class="editor-section editor-section--blocks">
                        <div class="editor-section__heading">
                            <div>
                                <p class="editor-section__eyebrow">Document</p>
                                <h2>Content</h2>
                            </div>
                        </div>

                        <div class="block-list" data-block-list aria-live="polite"></div>

                        <div class="add-block">
                            <button
                                class="add-block__button"
                                type="button"
                                data-add-block-button
                                aria-haspopup="menu"
                                aria-expanded="false"
                                aria-controls="block-menu"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                                Add block
                            </button>
                            <div
                                class="block-menu"
                                id="block-menu"
                                data-block-menu
                                role="menu"
                                hidden
                            ></div>
                        </div>
                    </section>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
