<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/step-editor.css') }}">
    <script
        type="module"
        src="{{ url_for('static', path='js/step-editor/step-editor.js') }}"
    ></script>
</head>
<body>
    <main class="step-editor" data-step-editor data-step-id="{{ step_id }}">
        <header class="editor-toolbar">
            <div class="editor-toolbar__start">
                <a class="icon-button" href="/admin" data-back-button aria-label="Go back">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>
                <div>
                    <p class="editor-toolbar__eyebrow">Lesson builder</p>
                    <h1>Step Editor</h1>
                </div>
            </div>

            <div class="editor-toolbar__actions">
                <div class="mode-switch" role="group" aria-label="Editor view">
                    <button
                        class="mode-switch__button is-active"
                        type="button"
                        data-mode="editor"
                        aria-pressed="true"
                    >
                        Editor
                    </button>
                    <button
                        class="mode-switch__button"
                        type="button"
                        data-mode="preview"
                        aria-pressed="false"
                    >
                        Preview
                    </button>
                </div>
                <button class="button button--primary" type="button" data-save-button>
                    Save
                </button>
            </div>
        </header>

        <section class="editor-panel" data-editor-panel aria-label="Step content editor">
            <div class="editor-section">
                <div class="editor-section__heading">
                    <div>
                        <h2>Layout</h2>
                        <p>Choose how the step content will be arranged.</p>
                    </div>
                </div>

                <div class="layout-options" role="radiogroup" aria-label="Step layout">
                    <label class="layout-option">
                        <input
                            type="radio"
                            name="step-layout"
                            value="vertical"
                            data-layout-option
                            checked
                        >
                        <span class="layout-option__visual layout-option__visual--vertical" aria-hidden="true">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                        <span>
                            <strong>Vertical</strong>
                            <small>Stack blocks in a single column</small>
                        </span>
                    </label>

                    <label class="layout-option">
                        <input
                            type="radio"
                            name="step-layout"
                            value="two_columns"
                            data-layout-option
                        >
                        <span class="layout-option__visual layout-option__visual--columns" aria-hidden="true">
                            <span></span>
                            <span></span>
                        </span>
                        <span>
                            <strong>Two columns</strong>
                            <small>Display content side by side</small>
                        </span>
                    </label>
                </div>
            </div>

            <div class="editor-section editor-section--blocks">
                <div class="editor-section__heading">
                    <div>
                        <h2>Content blocks</h2>
                        <p>Add the content that makes up this lesson step.</p>
                    </div>

                    <div class="add-block">
                        <button
                            class="button button--secondary"
                            type="button"
                            data-add-block-button
                            aria-haspopup="menu"
                            aria-expanded="false"
                            aria-controls="block-menu"
                        >
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            Add block
                        </button>
                        <div
                            class="block-menu"
                            id="block-menu"
                            data-block-menu
                            role="menu"
                            hidden
                        ></div>
                    </div>
                </div>

                <div class="block-list" data-block-list aria-live="polite"></div>
            </div>
        </section>

        <section
            class="preview-panel"
            data-preview-panel
            aria-label="Step preview"
            hidden
        ></section>
    </main>
</body>
</html>
