<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс | Musa Code Academy</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app-header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/course.css') }}">
    <script type="module" src="{{ url_for('static', path='js/app-header.js') }}"></script>
    <script type="module" src="{{ url_for('static', path='js/course.js') }}"></script>
</head>
<body>
    <header class="app-header">
        <div class="app-header__inner">
            <a class="app-header__brand" href="/dashboard" aria-label="Musa Code Academy">
                <span class="app-header__mark" aria-hidden="true">M</span>
                <span>Musa Code Academy</span>
            </a>

            <div class="app-header__profile" data-app-profile>
                <button
                    class="app-header__profile-button"
                    type="button"
                    aria-label="Открыть меню профиля"
                    aria-haspopup="true"
                    aria-expanded="false"
                    data-app-profile-button
                >М</button>
                <div class="app-header__menu" role="menu">
                    <a class="app-header__menu-item" href="#" role="menuitem">Профиль</a>
                    <a class="app-header__menu-item" href="#" role="menuitem">Настройки</a>
                    <button class="app-header__menu-item" type="button" role="menuitem">Выйти</button>
                </div>
            </div>
        </div>
    </header>

    <main
        class="course-page"
        data-course-page
        data-course-slug="{{ course_slug | default('') }}"
    >
        <a class="course-back" href="/courses">
            <span aria-hidden="true">&larr;</span>
            Назад ко всем курсам
        </a>

        <section class="course-hero" aria-labelledby="course-title">
            <h1 id="course-title" data-course-title></h1>
            <p data-course-description></p>
            <div class="course-meta" aria-label="Краткая информация о курсе" data-course-meta></div>
        </section>

        <div class="course-layout">
            <div class="course-main">
                <section class="course-card course-outcomes" aria-labelledby="course-outcomes-title">
                    <h2 id="course-outcomes-title">Что вы изучите</h2>
                    <div class="course-outcomes__grid" data-course-outcomes></div>
                </section>

                <section class="course-card course-program" aria-labelledby="course-program-title">
                    <h2 id="course-program-title">Программа курса</h2>
                    <div class="course-accordion" data-course-program></div>
                </section>
            </div>

            <aside class="course-sidebar" aria-label="Информация о курсе">
                <div class="course-info-card">
                    <dl class="course-facts">
                        <div>
                            <dt>Занятий:</dt>
                            <dd data-course-lessons-count></dd>
                        </div>
                        <div>
                            <dt>Разделов:</dt>
                            <dd data-course-sections-count></dd>
                        </div>
                        <div>
                            <dt>Уровень:</dt>
                            <dd data-course-level></dd>
                        </div>
                        <div>
                            <dt>Стоимость:</dt>
                            <dd data-course-price></dd>
                        </div>
                    </dl>

                    <button class="course-enroll-button" type="button">Записаться на курс</button>
                    <p class="course-note">
                        После записи станет доступно прохождение всех уроков и сохранение прогресса.
                    </p>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
