<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password? | Musa Code Academy</title>
    <link rel="stylesheet" href="{{url_for('static', path='css/login.css')}}">
    <script defer src="{{url_for('static', path='js/forgot-password.js')}}"></script>
</head>
<body>
    <main class="page">
        <section class="panel" aria-labelledby="forgot-password-title">
            <div class="brand" aria-label="Musa Code Academy">
                <span class="brand-mark">MC</span>
                <span>Musa Code Academy</span>
            </div>

            <p class="eyebrow">Account recovery</p>
            <h1 id="forgot-password-title">Forgot password?</h1>
            <p class="lead">Enter the email address you used during registration and we’ll send you instructions to reset your password.</p>

            <div class="message" id="form-message" role="status" aria-live="polite"></div>

            <form class="form" id="forgot-password-form" novalidate>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="Enter your email" autocomplete="email" required aria-describedby="form-message">
                </div>

                <button type="submit">Send instructions</button>
            </form>

            <p class="switch-link"><a href="/login">Back to sign in</a></p>
        </section>
    </main>
</body>
</html>
