<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать курс</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
    <script defer src="{{ url_for('static', path='js/edit_course.js') }}"></script>
</head>
<body>
    <div class="admin-page">
        <div class="admin-loading" data-admin-loading role="status" aria-live="polite">Проверка доступа...</div>
        <div class="admin-error" data-admin-error hidden></div>

        <main class="admin-shell admin-shell--narrow" data-admin-content hidden data-course-id="{{ course_id }}">
            <header class="admin-header admin-header--stacked">
                <a class="back-link" href="/admin">&larr; Назад</a>
                <h1>Редактировать курс</h1>
            </header>

            <section class="form-shell" aria-labelledby="edit-course-title">
                <h2 id="edit-course-title">Параметры курса</h2>

                <div class="form-message" id="course-form-message" role="status" aria-live="polite"></div>
                <div class="form-progress" data-form-progress hidden aria-hidden="true">
                    <span></span>
                </div>

                <form class="admin-form" data-course-edit-form novalidate>
                    <div class="field">
                        <label for="course-title">Название курса</label>
                        <input
                            id="course-title"
                            name="title"
                            type="text"
                            autocomplete="off"
                            placeholder="Например: Python для начинающих"
                            minlength="5"
                            maxlength="255"
                        >
                        <p class="field-error" data-error-for="title" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-slug">Slug</label>
                        <input
                            id="course-slug"
                            name="slug"
                            type="text"
                            autocomplete="off"
                            placeholder="python-dlya-nachinayushchikh"
                            minlength="2"
                            maxlength="255"
                            pattern="^[a-z0-9]+(?:-[a-z0-9]+)*$"
                        >
                        <p class="field-error" data-error-for="slug" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-short-description">Краткое описание</label>
                        <textarea
                            id="course-short-description"
                            name="short_description"
                            rows="3"
                            placeholder="Коротко опишите курс."
                            minlength="10"
                            maxlength="255"
                        ></textarea>
                        <p class="field-error" data-error-for="short_description" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-description">Описание курса</label>
                        <textarea
                            id="course-description"
                            name="description"
                            rows="5"
                            placeholder="Подробно опишите, чему посвящён курс."
                            minlength="20"
                            maxlength="5000"
                        ></textarea>
                        <p class="field-error" data-error-for="description" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-level">Уровень</label>
                        <input
                            id="course-level"
                            name="level"
                            type="text"
                            autocomplete="off"
                            placeholder="Например: Начинающий"
                            minlength="2"
                            maxlength="80"
                        >
                        <p class="field-error" data-error-for="level" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-price-label">Стоимость</label>
                        <input
                            id="course-price-label"
                            name="price_label"
                            type="text"
                            autocomplete="off"
                            placeholder="Например: Бесплатно"
                            minlength="2"
                            maxlength="120"
                        >
                        <p class="field-error" data-error-for="price_label" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-outcomes">Что вы изучите</label>
                        <textarea
                            id="course-outcomes"
                            name="outcomes"
                            rows="6"
                            placeholder="Переменные&#10;Условия&#10;Циклы&#10;Функции"
                            maxlength="1600"
                        ></textarea>
                        <p class="field-hint">Один пункт на строку. Эти пункты появятся на странице курса.</p>
                        <p class="field-error" data-error-for="outcomes" aria-live="polite"></p>
                    </div>

                    <div class="field">
                        <label for="course-is-published">Публикация</label>
                        <select id="course-is-published" name="is_published">
                            <option value="true">Publish</option>
                            <option value="false">Unpublish</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button class="button button--primary" type="submit" data-course-submit>Сохранить</button>
                        <a class="button button--ghost" href="/admin">Отмена</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
