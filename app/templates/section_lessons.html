<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки раздела</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app-header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/section-lessons.css') }}">
    <script type="module" src="{{ url_for('static', path='js/app-header.js') }}"></script>
    <script type="module" src="{{ url_for('static', path='js/section-lessons.js') }}"></script>
</head>
<body>
    <header class="app-header">
        <div class="app-header__inner">
            <a class="app-header__brand" href="/dashboard" aria-label="Musa Code Academy">
                <span class="app-header__mark" aria-hidden="true">M</span>
                <span>Musa Code Academy</span>
            </a>

            <div class="app-header__profile" data-app-profile>
                <button
                    class="app-header__profile-button"
                    type="button"
                    aria-label="Открыть меню профиля"
                    aria-haspopup="true"
                    aria-expanded="false"
                    data-app-profile-button
                >М</button>
                <div class="app-header__menu" role="menu">
                    <a class="app-header__menu-item" href="#" role="menuitem">Профиль</a>
                    <a class="app-header__menu-item" href="#" role="menuitem">Настройки</a>
                    <button class="app-header__menu-item" type="button" role="menuitem" data-app-logout>Выйти</button>
                </div>
            </div>
        </div>
    </header>

    <main
        class="lesson-page"
        data-lesson-page
        data-section-id="{{ section_id | default('') }}"
        data-course-slug="{{ course_slug | default('') }}"
    >
        <div class="lesson-page__loading" data-page-loading role="status">
            Загружаем уроки…
        </div>

        <div class="lesson-page__error" data-page-error role="alert" hidden>
            <h1>Не удалось загрузить раздел</h1>
            <p data-error-message>Попробуйте обновить страницу.</p>
            <button type="button" data-retry>Попробовать снова</button>
        </div>

        <div class="lesson-page__content" data-page-content hidden>
            <header class="section-hero">
                <a class="lesson-page__back" href="/dashboard" data-back-link>
                    <span aria-hidden="true">←</span>
                    Python для начинающих
                </a>

                <div class="section-hero__info">
                    <p class="section-hero__eyebrow" data-section-kicker>Раздел</p>
                    <h1 data-section-title></h1>
                    <p class="section-hero__description" data-section-description></p>
                </div>

                <div class="section-progress" aria-label="Прогресс по разделу">
                    <div
                        class="section-progress__track"
                        role="progressbar"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-valuenow="0"
                        data-progress-track
                    >
                        <span data-progress-bar></span>
                    </div>
                    <strong data-progress-percent>0%</strong>
                    <span data-progress-label>0 из 0 уроков завершено</span>
                </div>
            </header>

            <section class="lessons" aria-labelledby="lesson-list-title">
                <div class="lessons__heading">
                    <h2 id="lesson-list-title">Уроки</h2>
                    <span class="lessons__count" data-lesson-count></span>
                </div>

                <div class="lesson-list" data-lesson-list></div>

                <div class="lesson-empty" data-empty-state hidden>
                    <span class="lesson-empty__icon" aria-hidden="true">○</span>
                    <p>В этом разделе пока нет уроков.</p>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
