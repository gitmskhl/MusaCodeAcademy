<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
    <script defer src="{{ url_for('static', path='js/admin.js') }}"></script>
</head>
<body>
    <div class="admin-page">
        <div class="admin-loading" data-admin-loading role="status" aria-live="polite">Проверка доступа...</div>
        <div class="admin-error" data-admin-error hidden></div>

        <main class="admin-shell" data-admin-content hidden>
            <header class="admin-header">
                <h1>Админка</h1>
                <a class="button button--primary" href="/admin/courses/create">Создать курс</a>
            </header>

            <section class="section-block" aria-labelledby="my-courses-title">
                <h2 id="my-courses-title">Мои курсы</h2>

                <div class="course-list" role="list" data-course-list></div>
            </section>
        </main>
    </div>
</body>
</html>
